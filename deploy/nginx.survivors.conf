# nginx vhost template for Fruit Cup Survivors.
#
# This file uses ${...} placeholders that resolve to your .env values.
# Render with real values by running:
#
#   ./deploy.sh --print-nginx > /tmp/survivors.conf
#
# Then paste the rendered contents into your existing `server { ... }` block
# on the production host, and reload nginx:
#
#   sudo nginx -t && sudo systemctl reload nginx
#
# Placeholders (substituted by ./deploy.sh --print-nginx):
#   BASE_PATH          e.g. /survivors/
#   BASE_PATH_NOSLASH  e.g. /survivors
#   DEPLOY_DIR         e.g. /srv/survivors
#   SERVER_PORT        e.g. 4000
#
# nginx's own variables (uri, host, http_upgrade, scheme,
# proxy_add_x_forwarded_for) are intentionally left alone by the renderer.

# Redirect bare prefix to the trailing-slash form so relative asset URLs resolve.
location = ${BASE_PATH_NOSLASH} { return 301 ${BASE_PATH}; }

# Static client assets (Vite build output).
location ${BASE_PATH} {
    alias ${DEPLOY_DIR}/static/;
    try_files $uri $uri/ ${BASE_PATH}index.html;
}

# WebSocket upgrade. nginx strips the prefix and forwards /ws to the bun server.
location = ${BASE_PATH}ws {
    proxy_pass http://127.0.0.1:${SERVER_PORT}/ws;
    proxy_http_version 1.1;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        "upgrade";
    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 3600s;
}

# Leaderboard JSON endpoint.
location = ${BASE_PATH}leaderboard {
    proxy_pass http://127.0.0.1:${SERVER_PORT}/leaderboard;
    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# Health check (handy for uptime monitoring).
location = ${BASE_PATH}health {
    proxy_pass http://127.0.0.1:${SERVER_PORT}/health;
    proxy_set_header Host $host;
}
